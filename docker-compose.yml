version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: scout_db
    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout123
      POSTGRES_DB: scoutdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d scoutdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: